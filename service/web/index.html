<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Captur'd — agent-made demo videos</title>
<style>
  :root{ --bg:#0b0d10; --panel:#14171c; --line:#232830; --ink:#eef1f5; --dim:#9aa4b2;
         --gold:#f2c230; --blue:#4f8cff; --ok:#3bd6c3; --danger:#ff6b6b; }
  *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);
    font:15px/1.5 ui-sans-serif,system-ui,'Segoe UI',sans-serif}
  a{color:var(--blue)} .wrap{max-width:860px;margin:0 auto;padding:28px 20px}
  header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:26px}
  .brand{font-weight:700;letter-spacing:.2px} .brand b{color:var(--gold)}
  .sub{color:var(--dim);font-size:12px}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px;margin:14px 0}
  h1{font-size:26px;margin:.2em 0} h2{font-size:16px;margin:0 0 12px}
  label{display:block;font-size:12px;color:var(--dim);margin:12px 0 4px}
  input,select{width:100%;background:#0e1116;border:1px solid var(--line);color:var(--ink);
    border-radius:9px;padding:10px 12px;font-size:14px}
  .row{display:flex;gap:12px;flex-wrap:wrap} .row>div{flex:1;min-width:150px}
  button{background:var(--blue);color:#08111f;border:0;border-radius:9px;padding:11px 16px;
    font-weight:700;cursor:pointer;font-size:14px} button.ghost{background:#1b1f26;color:var(--ink);border:1px solid var(--line)}
  button.gold{background:var(--gold);color:#241d00} button:disabled{opacity:.5;cursor:not-allowed}
  .pill{display:inline-block;font-size:11px;padding:2px 9px;border-radius:999px;border:1px solid var(--line);color:var(--dim)}
  .pill.pro{color:#241d00;background:var(--gold);border-color:var(--gold)}
  .meter{height:8px;background:#0e1116;border-radius:999px;overflow:hidden;border:1px solid var(--line)}
  .meter>i{display:block;height:100%;background:var(--blue)}
  .note{font-size:12px;color:var(--dim)} .warn{color:var(--gold)} .err{color:var(--danger)}
  video{width:100%;border-radius:10px;margin-top:10px;background:#000}
  .hide{display:none} .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
    background:#1b1f26;border:1px solid var(--line);padding:10px 16px;border-radius:10px;font-size:13px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div><div class="brand">Captur<b>'</b>d </div></div>
    <div id="acct" class="hide"><span class="pill" id="planPill">free</span>
      <span class="note" id="acctEmail"></span>
      <button class="ghost" id="signout" style="margin-left:8px">Sign out</button></div>
  </header>

  <!-- SIGNED OUT -->
  <section id="signedOut" class="hide">
    <div class="panel">
      <h1>Your app, filmed by an agent.</h1>
      <p class="note">Give us a URL. We film a demo walkthrough — human typing, tight zooms,
        voiceover — no directing. First one's free.</p>
      <label>Email</label>
      <input id="email" type="email" placeholder="you@company.com" autocomplete="email">
      <div style="height:12px"></div>
      <div class="row">
        <div><button id="continueBtn" style="width:100%">Continue</button></div>
        <div id="googleWrap" class="hide"><button class="ghost" id="googleBtn" style="width:100%">Continue with Google</button></div>
      </div>
      <p class="note" id="devNote" style="margin-top:12px"></p>
    </div>
  </section>

  <!-- DASHBOARD -->
  <section id="dash" class="hide">
    <div class="panel">
      <h2>Film a demo</h2>
      <label>Product URL</label>
      <input id="url" type="url" placeholder="https://yourapp.com">
      <div class="row">
        <div><label>Look</label>
          <select id="template">
            <option value="saas-walkthrough">SaaS walkthrough</option>
            <option value="ux-showcase">UX showcase (hype)</option>
            <option value="feature-spotlight">Feature spotlight</option>
            <option value="tutorial-longform">Tutorial</option>
            <option value="social-teaser">Social teaser</option>
            <option value="login-flow">Login / signup</option>
          </select></div>
        <div><label>Aspect</label>
          <select id="aspect"><option value="16:9">16:9</option><option value="9:16">9:16 (social)</option><option value="1:1">1:1</option></select></div>
        <div><label>Voice</label>
          <select id="voice">
            <option value="">Default (Aria)</option>
            <option value="en-US-GuyNeural">Guy (US male)</option>
            <option value="en-GB-SoniaNeural">Sonia (UK female)</option>
            <option value="en-GB-RyanNeural">Ryan (UK male)</option>
          </select></div>
      </div>
      <div style="height:14px"></div>
      <button id="filmBtn">Film it</button>
      <span id="genState" class="note" style="margin-left:10px"></span>
      <div id="result" class="hide"><video id="video" controls></video></div>
    </div>

    <div class="panel">
      <h2>Your plan</h2>
      <div class="row" style="align-items:center">
        <div>
          <div class="note" id="usageLabel"></div>
          <div class="meter" style="margin-top:6px"><i id="usageBar" style="width:0%"></i></div>
        </div>
        <div style="flex:0 0 auto"><button class="gold" id="upgrade">Upgrade to Pro</button></div>
      </div>
      <p class="note" id="billingNote" style="margin-top:10px"></p>
      <p class="note" id="mcpNote" class="hide"></p>
    </div>
  </section>
</div>
<div id="toast" class="toast hide"></div>

<script>
const $ = s => document.querySelector(s);
const toast = m => { const t=$('#toast'); t.textContent=m; t.classList.remove('hide');
  clearTimeout(window._t); window._t=setTimeout(()=>t.classList.add('hide'),3200); };
async function api(path, opts){ const r = await fetch(path, opts); return r; }

let ME = null;
async function refresh(){
  const r = await api('/api/me'); ME = await r.json();
  if(!ME.signed_in){
    $('#signedOut').classList.remove('hide'); $('#dash').classList.add('hide'); $('#acct').classList.add('hide');
    if(ME.config.oauth_configured){ $('#googleWrap').classList.remove('hide'); $('#devNote').textContent=''; }
    else { $('#devNote').innerHTML = ME.config.dev_login ? 'Google sign-in goes live once the owner’s OAuth client is wired — use email to continue now.' : ''; }
    return;
  }
  $('#signedOut').classList.add('hide'); $('#dash').classList.remove('hide'); $('#acct').classList.remove('hide');
  $('#acctEmail').textContent = ME.email;
  const pp = $('#planPill'); pp.textContent = ME.plan; pp.className = 'pill' + (ME.plan==='pro'?' pro':'');
  const u = ME.usage;
  if(ME.plan==='pro'){ $('#usageLabel').textContent = `Pro — unlimited generations (${u.generations} made)`;
    $('#usageBar').style.width='100%'; $('#upgrade').classList.add('hide'); }
  else { $('#usageLabel').textContent = `${u.generations} / ${u.free_limit} free generation used`;
    $('#usageBar').style.width = Math.min(100, 100*u.generations/Math.max(1,u.free_limit))+'%';
    $('#upgrade').classList.remove('hide'); }
  $('#billingNote').innerHTML = ME.config.billing_configured
    ? 'Pro is '+ME.pro_price+'/mo — unlimited generations, history, MCP endpoint.'
    : '<span class="warn">Checkout goes live once the owner’s payment credentials are in.</span> Pro will be '+ME.pro_price+'/mo.';
  if(ME.mcp_endpoint){ const m=$('#mcpNote'); m.classList.remove('hide'); m.textContent='Your MCP endpoint: '+ME.mcp_endpoint; }
}

$('#continueBtn').onclick = async () => {
  const email = $('#email').value.trim();
  if(!email.includes('@')){ toast('Enter a valid email'); return; }
  const r = await api('/auth/dev-login',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({email})});
  if(r.ok) refresh(); else toast('Sign-in failed');
};
$('#googleBtn') && ($('#googleBtn').onclick = ()=> location.href='/auth/google/login');
$('#signout').onclick = async ()=>{ await api('/auth/logout',{method:'POST'}); location.reload(); };
$('#upgrade').onclick = ()=> location.href='/billing/checkout';

$('#filmBtn').onclick = async () => {
  const url = $('#url').value.trim();
  if(!url.startsWith('http')){ toast('Enter a valid http(s) URL'); return; }
  $('#filmBtn').disabled = true; $('#genState').textContent='Starting the film crew…'; $('#result').classList.add('hide');
  const body = { url, template:$('#template').value, aspect:$('#aspect').value, voice:$('#voice').value };
  const r = await api('/api/generate',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(body)});
  if(r.status===402){ const e=await r.json(); $('#genState').innerHTML='<span class="warn">'+e.detail+'</span>'; $('#filmBtn').disabled=false; return; }
  if(!r.ok){ const e=await r.json().catch(()=>({detail:'error'})); $('#genState').innerHTML='<span class="err">'+(e.detail||'error')+'</span>'; $('#filmBtn').disabled=false; return; }
  const {job_id} = await r.json();
  poll(job_id);
};
async function poll(job_id){
  const r = await api('/api/jobs/'+job_id); const j = await r.json();
  $('#genState').textContent = 'Filming… ('+j.status+')';
  if(j.status==='done'){ $('#genState').textContent='Done.'; $('#video').src='/api/jobs/'+job_id+'/video';
    $('#result').classList.remove('hide'); $('#filmBtn').disabled=false; refresh(); return; }
  if(j.status==='failed'||j.status==='capped'){ $('#genState').innerHTML='<span class="err">'+j.status+': '+(j.detail||'')+'</span>'; $('#filmBtn').disabled=false; return; }
  setTimeout(()=>poll(job_id), 2500);
}
refresh();
</script>
</body>
</html>
