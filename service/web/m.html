<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>RHOBEAR Captur'd</title>
<meta name="description" content="Your app, filmed by an agent — the Captur'd phone studio.">
<link rel="icon" type="image/png" href="/assets/capturd-bear.png">
<script>
  // Wrong-surface guard: mouse/trackpad visitors belong on the full studio.
  (function () {
    try {
      if (new URLSearchParams(location.search).get('surface') === 'mobile') return;
      if (matchMedia('(pointer: coarse)').matches) return;
      location.replace('/?surface=desktop');
    } catch (_e) { /* stay */ }
  })();
</script>
<style>
  :root{
    --bg:#120c02; --bg-2:#1a1305;
    --panel:rgba(255,255,255,0.035); --panel-hi:rgba(255,255,255,0.06);
    --border:rgba(255,255,255,0.08); --border-hi:rgba(255,125,31,0.3);
    --glass:rgba(26,19,5,0.8); --glass-bd:rgba(255,255,255,0.10); --glass-hi:rgba(255,255,255,0.16);
    --text:#f6efe2; --text-2:#b8a98f; --text-dim:#7d6e52;
    --amber:#ff7d1f; --amber-2:#ffc24d; --amber-glow:rgba(255,125,31,0.35);
    --ok:#4ade80; --err:#f87171;
    --ease:cubic-bezier(0.2,0,0,1);
    --sans:-apple-system,'SF Pro Text','Segoe UI',system-ui,sans-serif;
    --serif:'New York','Iowan Old Style',Charter,Georgia,serif;
    --mono:ui-monospace,'SF Mono',Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{overscroll-behavior:none}
  body{background:var(--bg);color:var(--text);font:15px/1.5 var(--sans);-webkit-font-smoothing:antialiased;
    min-height:100dvh;-webkit-tap-highlight-color:transparent}
  ::selection{background:var(--amber);color:#1a1300}
  button{font-family:var(--sans)}
  .icn{width:18px;height:18px;display:block;stroke:currentColor;fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round}

  .top{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:10px;
    padding:calc(10px + env(safe-area-inset-top)) 16px 10px;
    background:linear-gradient(180deg,var(--bg-2),rgba(26,19,5,.9));backdrop-filter:blur(16px);
    border-bottom:1px solid var(--border)}
  .top img{width:30px;height:30px;filter:drop-shadow(0 0 7px rgba(79,140,255,.5))}
  .top b{font-size:.9rem}
  .top small{display:block;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);font-weight:600}
  .top .sp{flex:1}
  .pill{font-size:.62rem;font-family:var(--mono);padding:3px 9px;border-radius:999px;border:1px solid var(--border);color:var(--text-2)}
  .pill.pro{color:#1a1300;background:linear-gradient(135deg,var(--amber),var(--amber-2));border-color:transparent;font-weight:700}

  .wrap{padding:18px 16px calc(96px + env(safe-area-inset-bottom))}
  .card{background:linear-gradient(180deg,var(--panel-hi),var(--panel));border:1px solid var(--border);border-radius:18px;padding:18px;margin-bottom:16px}
  h1{font-family:var(--serif);font-weight:600;font-size:1.45rem;letter-spacing:-.02em}
  h2{font-family:var(--serif);font-weight:600;font-size:1.08rem;margin-bottom:10px}
  label{display:block;font-size:.7rem;font-weight:600;color:var(--text-2);margin:0 0 6px;letter-spacing:.03em}
  input,textarea{width:100%;background:rgba(0,0,0,.3);border:1px solid var(--border);color:var(--text);
    border-radius:12px;padding:13px 14px;font:.95rem/1.4 var(--sans)}
  input:focus,textarea:focus{outline:none;border-color:var(--border-hi)}
  .note{font-size:.74rem;color:var(--text-dim)} .warn{color:var(--amber-2)} .err{color:var(--err)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:1px solid var(--border);
    background:var(--panel-hi);color:var(--text);font-size:.86rem;font-weight:600;
    padding:13px 18px;border-radius:13px;cursor:pointer;min-height:46px}
  .btn--primary{color:#1a1300;border:none;background:linear-gradient(135deg,var(--amber),var(--amber-2));
    box-shadow:0 8px 24px -10px var(--amber-glow)}
  .btn--ghost{background:transparent;border-color:transparent;color:var(--text-2)}
  .btn:disabled{opacity:.45}
  .hide{display:none}

  /* signed-out hero */
  .hero{text-align:center;padding:7vh 4px 0}
  .hero img{width:92px;filter:drop-shadow(0 12px 40px rgba(79,140,255,.45))}
  .hero h1{margin:14px 0 8px}
  .hero p{color:var(--text-2);font-size:.9rem;margin-bottom:20px}

  /* glass brief bar */
  .ask{border-radius:16px;margin-top:12px;
    background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.02));
    border:1px solid var(--glass-bd);
    box-shadow:inset 0 1px 0 var(--glass-hi),0 8px 24px -12px rgba(0,0,0,.5);padding:11px 11px 9px}
  .ask:focus-within{border-color:var(--border-hi)}
  .ask textarea{background:transparent;border:none;resize:none;min-height:40px;padding:0 2px 6px;font-size:.92rem}
  .ask .row2{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none}
  .ask .hintchip{flex-shrink:0;font-size:.66rem;color:var(--text-dim);border:1px solid var(--border);
    border-radius:999px;padding:5px 11px;background:transparent}

  /* template cards: horizontal snap scroll */
  .tpls{display:flex;gap:10px;overflow-x:auto;scroll-snap-type:x mandatory;padding:4px 2px 8px;scrollbar-width:none;margin-top:12px}
  .tpls::-webkit-scrollbar{display:none}
  .tpl{flex:0 0 46%;scroll-snap-align:start;border:1px solid var(--border);border-radius:14px;
    background:var(--bg-2);padding:13px;text-align:left}
  .tpl.sel{border-color:var(--amber);box-shadow:0 0 0 1px var(--amber)}
  .tpl .icn{width:20px;height:20px;color:var(--amber);margin-bottom:7px}
  .tpl b{display:block;font-size:.8rem}
  .tpl span{display:block;font-size:.66rem;color:var(--text-dim);margin-top:2px}

  /* voice chips */
  .voices{display:flex;gap:8px;overflow-x:auto;padding:4px 2px 8px;scrollbar-width:none;margin-top:6px}
  .voices::-webkit-scrollbar{display:none}
  .voice{flex-shrink:0;border:1px solid var(--border);border-radius:999px;background:var(--bg-2);
    padding:9px 14px;font-size:.76rem;color:var(--text-2);display:flex;align-items:center;gap:6px}
  .voice.sel{border-color:var(--amber);color:var(--text);box-shadow:0 0 0 1px var(--amber)}
  .voice .hd{font-size:.54rem;font-family:var(--mono);color:#1a1300;font-weight:700;
    background:linear-gradient(135deg,var(--amber),var(--amber-2));border-radius:999px;padding:1px 6px}

  .seg{display:inline-flex;background:var(--bg-2);border:1px solid var(--border);border-radius:999px;padding:3px;margin-top:6px}
  .seg button{border:none;background:transparent;color:var(--text-2);font-size:.76rem;font-weight:600;
    padding:9px 16px;border-radius:999px}
  .seg button.sel{color:#1a1300;background:linear-gradient(135deg,var(--amber),var(--amber-2))}

  /* fixed film bar */
  .filmbar{position:fixed;left:0;right:0;bottom:0;z-index:40;display:flex;gap:10px;align-items:center;
    padding:12px 16px calc(12px + env(safe-area-inset-bottom));
    background:var(--glass);backdrop-filter:blur(20px);border-top:1px solid var(--glass-bd)}
  .filmbar .btn--primary{flex:1;font-size:.95rem}
  .filmbar .state{font-size:.72rem;color:var(--text-2);max-width:38%}

  .prog{display:none;align-items:center;gap:10px;margin-top:14px;padding:12px 14px;border-radius:13px;
    background:var(--panel);border:1px solid var(--border);font-size:.8rem;color:var(--text-2)}
  .prog.on{display:flex}
  .prog .dots{display:flex;gap:4px}
  .prog .dots i{width:6px;height:6px;border-radius:50%;background:var(--amber);animation:pd 1.2s ease-in-out infinite}
  .prog .dots i:nth-child(2){animation-delay:.18s}.prog .dots i:nth-child(3){animation-delay:.36s}
  @keyframes pd{0%,100%{opacity:.25;transform:scale(.8)}50%{opacity:1;transform:scale(1.1)}}
  .result{margin-top:14px;display:none}
  .result.on{display:block}
  .result video{width:100%;border-radius:13px;background:#000;border:1px solid var(--border)}

  .galitem{border:1px solid var(--border);border-radius:14px;background:var(--bg-2);overflow:hidden;margin-bottom:12px}
  .galitem video{width:100%;aspect-ratio:16/9;background:#000;display:block}
  .galitem .meta{display:flex;padding:9px 12px;font-size:.7rem;color:var(--text-2)}
  .galitem .meta .st{margin-left:auto;font-family:var(--mono);font-size:.6rem}
  .st.done{color:var(--ok)} .st.failed,.st.capped{color:var(--err)} .st.running,.st.queued{color:var(--amber-2)}
  .galempty{color:var(--text-dim);font-size:.8rem;padding:20px;border:1px dashed var(--border);border-radius:14px;text-align:center}

  .meter{height:8px;background:rgba(0,0,0,.35);border-radius:999px;overflow:hidden;border:1px solid var(--border);margin-top:8px}
  .meter i{display:block;height:100%;background:linear-gradient(90deg,var(--amber),var(--amber-2))}

  .toast{position:fixed;bottom:calc(86px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);z-index:60;
    background:var(--glass);backdrop-filter:blur(16px);border:1px solid var(--glass-bd);
    padding:10px 16px;border-radius:12px;font-size:.78rem;white-space:nowrap}

  /* Rho under the top bar */
  #rho-launch{top:calc(env(safe-area-inset-top) + 58px) !important;right:10px !important;bottom:auto !important;
    width:40px !important;height:40px !important}
  #rho-panel{top:calc(env(safe-area-inset-top) + 106px) !important;bottom:auto !important}
</style>
</head>
<body>

<header class="top">
  <img src="/assets/capturd-bear.png" alt="">
  <span><b>Captur'd</b><small>filmed by an agent</small></span>
  <span class="sp"></span>
  <span class="pill hide" id="planPill">free</span>
  <button class="btn btn--ghost hide" id="signout" style="min-height:36px;padding:7px 10px;font-size:.72rem">Sign out</button>
</header>

<div class="wrap">
  <!-- SIGNED OUT -->
  <section id="signedOut" class="hide">
    <div class="hero">
      <img src="/assets/capturd-bear.png" alt="">
      <h1>Your app, filmed by an agent.</h1>
      <p>Give it a URL — the crew films the demo. First one's free.</p>
    </div>
    <div class="card">
      <label>Email</label>
      <input id="email" type="email" placeholder="you@company.com" autocomplete="email">
      <div style="height:12px"></div>
      <button id="continueBtn" class="btn btn--primary" style="width:100%">Continue</button>
      <button class="btn hide" id="googleBtn" style="width:100%;margin-top:8px">Continue with Google</button>
      <p class="note" id="devNote" style="margin-top:12px"></p>
    </div>
  </section>

  <!-- STUDIO -->
  <section id="dash" class="hide">
    <div class="card">
      <h2>Film a demo</h2>
      <label>Product URL</label>
      <input id="url" type="url" placeholder="https://yourapp.com">
      <div class="ask" id="ask">
        <textarea id="brief" rows="2" placeholder="Tell the director what to film…"></textarea>
        <div class="row2">
          <button type="button" class="hintchip" data-hint="Show how easy onboarding is — end on the dashboard.">onboarding</button>
          <button type="button" class="hintchip" data-hint="Spotlight the analytics page and make the charts the hero.">analytics</button>
          <button type="button" class="hintchip" data-hint="A fast hype cut for social — energy, zooms, bold lines.">hype cut</button>
        </div>
      </div>

      <div class="tpls" id="tpls">
        <button class="tpl sel" data-tpl="saas-walkthrough"><svg class="icn"><use href="#i-film"/></svg><b>SaaS walkthrough</b><span>the classic tour</span></button>
        <button class="tpl" data-tpl="ux-showcase"><svg class="icn"><use href="#i-zap"/></svg><b>UX showcase</b><span>cinematic hype</span></button>
        <button class="tpl" data-tpl="feature-spotlight"><svg class="icn"><use href="#i-spot"/></svg><b>Spotlight</b><span>one feature, close</span></button>
        <button class="tpl" data-tpl="tutorial-longform"><svg class="icn"><use href="#i-book"/></svg><b>Tutorial</b><span>patient pacing</span></button>
        <button class="tpl" data-tpl="social-teaser"><svg class="icn"><use href="#i-social"/></svg><b>Social teaser</b><span>vertical, quick</span></button>
        <button class="tpl" data-tpl="login-flow"><svg class="icn"><use href="#i-login"/></svg><b>Login flow</b><span>typed live</span></button>
      </div>

      <label style="margin-top:8px">Voice</label>
      <div class="voices" id="voices">
        <button class="voice sel" data-voice="vertex:Charon:warm"><span class="hd">HD</span>Charon</button>
        <button class="voice" data-voice="vertex:Kore:warm"><span class="hd">HD</span>Kore</button>
        <button class="voice" data-voice="vertex:Aoede:warm"><span class="hd">HD</span>Aoede</button>
        <button class="voice" data-voice="vertex:Fenrir:trailer"><span class="hd">HD</span>Fenrir</button>
        <button class="voice" data-voice="vertex:Zephyr:warm"><span class="hd">HD</span>Zephyr</button>
        <button class="voice" data-voice="">Aria</button>
      </div>

      <label style="margin-top:8px">Aspect</label>
      <div class="seg" id="aspect">
        <button class="sel" data-aspect="9:16">9:16</button>
        <button data-aspect="16:9">16:9</button>
        <button data-aspect="1:1">1:1</button>
      </div>

      <div class="prog" id="prog"><span class="dots"><i></i><i></i><i></i></span><span id="progText">The film crew is on set…</span></div>
      <div class="result" id="result"><video id="video" controls playsinline></video></div>
    </div>

    <div class="card">
      <h2>Your demos</h2>
      <div id="galgrid"></div>
      <div class="galempty hide" id="galempty">Nothing filmed yet — your first demo lands here.</div>
    </div>

    <div class="card">
      <div class="note" id="usageLabel"></div>
      <div class="meter"><i id="usageBar" style="width:0%"></i></div>
      <p class="note" id="billingNote" style="margin-top:10px"></p>
      <button class="btn btn--primary" id="upgrade" style="width:100%;margin-top:12px">Upgrade to Pro</button>
    </div>
  </section>
</div>

<!-- fixed film bar (studio only) -->
<div class="filmbar hide" id="filmbar">
  <span class="state" id="genState"></span>
  <button id="filmBtn" class="btn btn--primary"><svg class="icn"><use href="#i-film"/></svg>Film it</button>
</div>
<div id="toast" class="toast hide"></div>

<script>
const $ = s => document.querySelector(s);
const toast = m => { const t=$('#toast'); t.textContent=m; t.classList.remove('hide');
  clearTimeout(window._t); window._t=setTimeout(()=>t.classList.add('hide'),3200); };
const api = (path, opts) => fetch(path, opts);

let ME=null, TPL='saas-walkthrough', ASPECT='9:16', VOICE='vertex:Charon:warm';

$('#tpls').addEventListener('click', e => { const b=e.target.closest('.tpl'); if(!b) return;
  document.querySelectorAll('.tpl').forEach(x=>x.classList.remove('sel')); b.classList.add('sel'); TPL=b.dataset.tpl; });
$('#aspect').addEventListener('click', e => { const b=e.target.closest('button'); if(!b) return;
  document.querySelectorAll('#aspect button').forEach(x=>x.classList.remove('sel')); b.classList.add('sel'); ASPECT=b.dataset.aspect; });
$('#voices').addEventListener('click', e => { const b=e.target.closest('.voice'); if(!b) return;
  document.querySelectorAll('.voice').forEach(x=>x.classList.remove('sel')); b.classList.add('sel'); VOICE=b.dataset.voice; });
document.querySelectorAll('.hintchip').forEach(c => c.addEventListener('click', () => {
  $('#brief').value = c.dataset.hint; }));

async function refresh(){
  const r = await api('/api/me'); ME = await r.json();
  if(!ME.signed_in){
    $('#signedOut').classList.remove('hide'); $('#dash').classList.add('hide');
    $('#filmbar').classList.add('hide'); $('#planPill').classList.add('hide'); $('#signout').classList.add('hide');
    if(ME.config.oauth_configured){ $('#googleBtn').classList.remove('hide'); }
    else if(ME.config.dev_login){ $('#devNote').textContent='Google sign-in comes with OAuth — use email for now.'; }
    return;
  }
  $('#signedOut').classList.add('hide'); $('#dash').classList.remove('hide');
  $('#filmbar').classList.remove('hide'); $('#signout').classList.remove('hide');
  const pp=$('#planPill'); pp.classList.remove('hide'); pp.textContent=ME.plan; pp.className='pill'+(ME.plan==='pro'?' pro':'');
  const u=ME.usage;
  if(ME.plan==='pro'){ $('#usageLabel').textContent=`Pro — unlimited demos (${u.generations} filmed)`;
    $('#usageBar').style.width='100%'; $('#upgrade').classList.add('hide'); }
  else { $('#usageLabel').textContent=`${u.generations} / ${u.free_limit} free demo used`;
    $('#usageBar').style.width=Math.min(100,100*u.generations/Math.max(1,u.free_limit))+'%';
    $('#upgrade').classList.remove('hide'); }
  $('#billingNote').innerHTML = ME.config.billing_configured
    ? 'Pro is '+ME.pro_price+'/mo — unlimited demos, HD voices, history.'
    : '<span class="warn">Checkout goes live shortly.</span> Pro will be '+ME.pro_price+'/mo.';
  loadGallery();
}
async function loadGallery(){
  try{
    const r = await api('/api/jobs'); if(!r.ok) return;
    const {jobs} = await r.json();
    const g=$('#galgrid'); g.innerHTML='';
    if(!jobs.length){ $('#galempty').classList.remove('hide'); return; }
    $('#galempty').classList.add('hide');
    for(const j of jobs){
      const d=document.createElement('div'); d.className='galitem';
      const when=new Date((j.created_at||0)*1000).toLocaleDateString();
      d.innerHTML=(j.has_video&&j.status==='done'
          ?`<video src="/api/jobs/${j.job_id}/video" preload="metadata" controls playsinline></video>`:'')+
        `<div class="meta"><span>${when}</span><span class="st ${j.status}">${j.status}</span></div>`;
      g.appendChild(d);
    }
  }catch(_e){}
}
$('#continueBtn').onclick = async () => {
  const email=$('#email').value.trim();
  if(!email.includes('@')){ toast('Enter a valid email'); return; }
  const r=await api('/auth/dev-login',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({email})});
  if(r.ok) refresh(); else toast('Sign-in failed');
};
$('#googleBtn').onclick = ()=> location.href='/auth/google/login';
$('#signout').onclick = async ()=>{ await api('/auth/logout',{method:'POST'}); location.reload(); };
$('#upgrade').onclick = ()=> location.href='/billing/checkout';
$('#filmBtn').onclick = async () => {
  const url=$('#url').value.trim();
  if(!url.startsWith('http')){ toast('Enter a valid http(s) URL'); return; }
  $('#filmBtn').disabled=true; $('#genState').textContent='';
  $('#result').classList.remove('on'); $('#prog').classList.add('on'); $('#ask').classList.add('busy');
  const body={url,template:TPL,aspect:ASPECT,voice:VOICE,brief:$('#brief').value.trim()};
  const r=await api('/api/generate',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(body)});
  if(r.status===402){ const e=await r.json(); endRun(); $('#genState').innerHTML='<span class="warn">'+e.detail+'</span>'; return; }
  if(!r.ok){ const e=await r.json().catch(()=>({detail:'error'})); endRun(); $('#genState').innerHTML='<span class="err">'+(e.detail||'error')+'</span>'; return; }
  const {job_id}=await r.json(); poll(job_id);
};
function endRun(){ $('#filmBtn').disabled=false; $('#prog').classList.remove('on'); $('#ask').classList.remove('busy'); }
async function poll(job_id){
  const r=await api('/api/jobs/'+job_id); const j=await r.json();
  $('#progText').textContent='Filming… ('+j.status+')';
  if(j.status==='done'){ endRun(); $('#genState').textContent='Done.';
    $('#video').src='/api/jobs/'+job_id+'/video'; $('#result').classList.add('on'); refresh(); return; }
  if(j.status==='failed'||j.status==='capped'){ endRun();
    $('#genState').innerHTML='<span class="err">'+j.status+'</span>'; return; }
  setTimeout(()=>poll(job_id),2500);
}
refresh();
</script>

<!-- Rho — companion, phone corner -->
<script>
  window.RHOBEAR_COMPANION = {
