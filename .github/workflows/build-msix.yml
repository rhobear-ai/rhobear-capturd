name: Build MSIX

on:
  push:
    branches:
      - main
      - 'feat/*'
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-msix:
    name: Build Capturd MSIX
    runs-on: windows-latest

    env:
      PYTHONUNBUFFERED: '1'
      MSIX_OUTPUT: dist/Capturd-0.2.0.msix

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Display Python version
        run: python --version

      - name: Install project + deps
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[voice,dev]"
          pip install pyinstaller pillow

      - name: Install Playwright Chromium
        shell: pwsh
        run: |
          python -m playwright install chromium

      - name: Download faster-whisper small.en model
        shell: pwsh
        run: |
          python -c "from faster_whisper import WhisperModel; WhisperModel('small.en', device='cpu', compute_type='int8')"
        # Uses CPU / int8 to avoid CUDA dependency on CI; model files are platform-agnostic.

      - name: Download ffmpeg static build
        shell: pwsh
        run: |
          $ffmpegZip = "${{ runner.temp }}\ffmpeg-release-essentials.zip"
          $ffmpegDir = "${{ runner.temp }}\ffmpeg-extract"
          $destDir = "packaging\ffmpeg"

          Write-Host "Downloading ffmpeg from gyan.dev..."
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile $ffmpegZip

          Write-Host "Extracting..."
          Expand-Archive -Path $ffmpegZip -DestinationPath $ffmpegDir

          # Find the extracted bin/ directory (name varies by version)
          $binDir = Get-ChildItem -Path $ffmpegDir -Directory | Select-Object -First 1
          $binDir = Join-Path $binDir.FullName "bin"

          New-Item -ItemType Directory -Force -Path $destDir | Out-Null
          Copy-Item (Join-Path $binDir "ffmpeg.exe") (Join-Path $destDir "ffmpeg.exe")
          Copy-Item (Join-Path $binDir "ffprobe.exe") (Join-Path $destDir "ffprobe.exe")

          Write-Host "ffmpeg.exe: $((Get-Item (Join-Path $destDir ffmpeg.exe)).Length) bytes"
          Write-Host "ffprobe.exe: $((Get-Item (Join-Path $destDir ffprobe.exe)).Length) bytes"

      - name: Run MSIX build
        shell: pwsh
        run: |
          .\packaging\build-msix.ps1

      - name: Validate MSIX manifest
        shell: pwsh
        run: |
          if (Test-Path "$env:MSIX_OUTPUT") {
            Write-Host "MSIX exists: $env:MSIX_OUTPUT"
            Write-Host "Size: $((Get-Item $env:MSIX_OUTPUT).Length / 1MB) MB"
          }
          else {
            Write-Error "MSIX not found at $env:MSIX_OUTPUT"
            exit 1
          }

          # Validate AppxManifest.xml structure (offline check)
          $manifestPath = "packaging\msix\AppxManifest.xml"
          [xml]$manifest = Get-Content $manifestPath
          Write-Host "Identity Name: $($manifest.Package.Identity.Name)"
          Write-Host "Identity Version: $($manifest.Package.Identity.Version)"
          Write-Host "DisplayName: $($manifest.Package.Properties.DisplayName)"
          Write-Host "Capabilities: $($manifest.Package.Capabilities.Capability -join ', ')"
          Write-Host "Manifest XML parses OK."

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: Capturd-0.2.0.msix
          path: dist/Capturd-0.2.0.msix
          if-no-files-found: error
          retention-days: 30

      - name: Sign MSIX (Azure Trusted Signing)
        shell: pwsh
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: |
          $cli = "$env:RUNNER_TEMP\artifact-signing-cli.exe"
          Invoke-WebRequest -Uri "https://github.com/Levminer/artifact-signing-cli/releases/download/0.11.0/artifact-signing-cli.exe" -OutFile $cli
          & $cli -e https://eus.codesigning.azure.net/ -a rhobear-signing -c rhobear-public "$env:MSIX_OUTPUT"
          if ($LASTEXITCODE -ne 0) { throw "Azure Trusted Signing failed (exit $LASTEXITCODE)" }
          $sig = Get-AuthenticodeSignature "$env:MSIX_OUTPUT"
          Write-Host "Signature status: $($sig.Status)"
          Write-Host "Signer: $($sig.SignerCertificate.Subject)"
          if ($sig.Status -ne 'Valid') { throw "Signature not Valid: $($sig.Status)" }
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "$env:MSIX_OUTPUT" "dist/RHOBEAR-Capturd-Setup.msix" -Force

      - name: Publish signed MSIX to capturd-latest release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "capturd-latest"
          gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag "dist/RHOBEAR-Capturd-Setup.msix" `
              --title "RHOBEAR Captur'd — Desktop (latest)" `
              --notes "Signed, one-click Windows installer (MSIX). Double-click to install — Microsoft-trusted signature, no SmartScreen warning. Post-work product capture: stills and agent-made walkthroughs." `
              --latest=false
          } else {
            gh release upload $tag "dist/RHOBEAR-Capturd-Setup.msix" --clobber
          }
